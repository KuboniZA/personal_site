    <style>
        .main {
            position: relative;
            top: 100px;
        }

    .carousel1, .carousel2, .carousel3, .carousel4, .carousel5, .carousel6, .carousel7 {
        display: flex;
    }
        .pic-container {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            align-items: center;
        }

        .pic-container::-webkit-scrollbar {
            display: none;
        }
        .pics {
            flex: 0 0 250px;
            box-shadow: 0px 0px 10px grey,
                        0px 0px 7px inset black;
            border-radius: 10px;
            max-width: 220px;
            max-height: 220px;
            position: relative;
        }
    @keyframes spin {
        from {translate: 0;}
        to {translate: -100%;}
    }
    .card1, .card3, .card5, .card7 {
        animation: spin 30s infinite linear;
    }
    @keyframes skew {
        from {translate: -100%;}
        to {translate: 0%;}
    }
    .card2, .card4, .card6 {
        animation: skew 30s infinite linear;
    }

    </style>
